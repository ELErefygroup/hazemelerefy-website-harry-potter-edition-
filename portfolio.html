<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://hazemelerefy.vercel.app">
  <title>Redirecting to Hazem Elerefy's Portfolio...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600&display=swap');

    body {
      background-color: #0a0f1c;
      color: #e8dbb8;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      overflow: hidden;
    }
    
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 700;
      color: #e6b25e;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      text-shadow: 0 0 15px rgba(230, 178, 94, 0.35);
    }

    p {
      font-size: 13px;
      color: #e8dbb8;
      opacity: 0.85;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    .loader-container {
      position: relative;
      width: 60px;
      height: 60px;
      margin-bottom: 24px;
    }

    .loader {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(230, 178, 94, 0.1);
      border-radius: 50%;
      border-top-color: #e6b25e;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      box-shadow: 0 0 15px rgba(230, 178, 94, 0.15);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fallback {
      font-size: 11px;
      opacity: 0.6;
    }

    a {
      color: #e6b25e;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dashed rgba(230, 178, 94, 0.5);
      transition: all 0.2s ease;
    }

    a:hover {
      color: #f7d08a;
      border-bottom-color: #f7d08a;
      text-shadow: 0 0 8px rgba(230, 178, 94, 0.5);
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="loader"></div>
  </div>
  <h1>Saddling the Owl</h1>
  <p>Redirecting you to the magical portfolio of Hazem Elerefy...</p>
  
  <div class="fallback">
    If the spell takes too long, <a href="https://hazemelerefy.vercel.app">click here to enter the magical realm</a>.
  </div>

  <script>
    // Immediate script redirection
    window.location.href = "https://hazemelerefy.vercel.app";
  </script>
</body>
</html>
